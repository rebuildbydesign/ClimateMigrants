<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta NAME="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archetype Map</title>

    <!-- MAPBOX GL -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

    <!-- MAPBOX GEOCODER -->
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css"
        rel="stylesheet">
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

    <!-- TURF -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <!-- OPTIONAL FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- YOUR STYLES -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- OPTIONAL LOGO (KEEP IF YOU WANT BRANDING) -->
    <div id="rbd-logo-container">
        <img src="img/RBD-logo.png" alt="Logo" id="rbd-logo">
    </div>

    <!-- TITLE (OPTIONAL) -->
    <div id="title-container">
        <h2 style="font-family:Poppins, Arial; font-weight:600;">
            Archetype Mapping System
        </h2>
    </div>

    <!-- GEOCODER SEARCH -->
    <div id="geocoder" style="position:absolute;top:90px;left:19px;z-index:9999;width:320px;"></div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- TOOLTIP -->
    <div id="map-tooltip" style="display:none;"></div>

    <!-- =========================
         LEGEND (ARCHETYPE READY)
    ========================== -->
    <div id="legend">
        <div class="legend-title">Archetypes</div>

        <div class="legend-item">
            <div class="legend-dot" style="background:#d73027;"></div>
            Risk
        </div>

        <div class="legend-item">
            <div class="legend-dot" style="background:#fc8d59;"></div>
            Origin
        </div>

        <div class="legend-item">
            <div class="legend-dot" style="background:#4575b4;"></div>
            Opportunity
        </div>

        <div class="legend-item">
            <div class="legend-dot" style="background:#91bfdb;"></div>
            Destination
        </div>

        <div class="legend-item">
            <div class="legend-dot" style="background:#1a9850;"></div>
            Coastal Destination
        </div>

        <div class="legend-item">
            <div class="legend-dot" style="background:#999;"></div>
            Other / Unclassified
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="scripts.js"></script>

</body>
</html>
